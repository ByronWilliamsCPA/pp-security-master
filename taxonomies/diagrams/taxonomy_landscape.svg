<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="323px" preserveAspectRatio="none" style="width:1689px;height:323px;background:#FFFFFF;" version="1.1" viewBox="0 0 1689 323" width="1689px" zoomAndPan="magnify"><title>Portfolio Performance Taxonomies In Use (7 of 8 PP templates + 1 custom)</title><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="516.514" x="578.743" y="24.9659">Portfolio Performance Taxonomies In Use (7 of 8 PP templates + 1 custom)</text><rect fill="#DDDDDD" height="48.1358" id="_legend" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1;" width="570.1238" x="551.9381" y="52.0679"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="373.0706" x="556.9381" y="72.0339">Each card: taxonomy name | levels | classification nodes</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="560.1238" x="556.9381" y="91.1018">Key scheme = the portfolioClassificationKey namespace PP uses for auto-assignment.</text><!--cluster builtin--><g id="cluster_builtin"><rect fill="#EFF6FF" height="200" rx="2.5" ry="2.5" style="stroke:#888888;stroke-width:1;" width="688" x="14" y="117.2038"/><text fill="#222222" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="401.2665" x="157.3668" y="134.1697">Built-in PP templates (created via File &gt; New &gt; Taxonomy)</text></g><!--cluster custom--><g id="cluster_custom"><rect fill="#F3FFF3" height="101" rx="2.5" ry="2.5" style="stroke:#888888;stroke-width:1;" width="403" x="1280" y="117.2038"/><text fill="#222222" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="387.6725" x="1287.6638" y="134.1697">Custom (imported via File &gt; Import &gt; Import taxonomy)</text></g><g id="elem_GMN11"><path d="M712,255.2038 L712,300.6158 L1183.8924,300.6158 L1183.8924,265.2038 L1173.8924,255.2038 L712,255.2038 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1173.8924,255.2038 L1173.8924,265.2038 L1183.8924,265.2038 L1173.8924,255.2038 " fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="375.2193" x="718" y="274.1008">Not used: Industry (proprietary V-codes), Regions (non-MSCI).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="450.8924" x="718" y="291.8068">Built-ins can be created from PP's template picker or imported from JSON.</text></g><g id="elem_GMN14"><path d="M1202,255.2038 L1202,300.6158 L1481.9083,300.6158 L1481.9083,265.2038 L1471.9083,255.2038 L1202,255.2038 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1471.9083,255.2038 L1471.9083,265.2038 L1481.9083,265.2038 L1471.9083,255.2038 " fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.9083" x="1208" y="274.1008">The one taxonomy that must be imported.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.2092" x="1208" y="291.8068">Detail: brx_plus_taxonomy.puml</text></g><!--entity ac--><g id="elem_ac"><rect fill="#FFF3F3" height="63.2038" rx="2.5" ry="2.5" style="stroke:#FF6666;stroke-width:0.5;" width="210.1892" x="31" y="147.2038"/><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="87.2757" x="41" y="165.1697">Asset Classes</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="106.2456" x="41" y="184.2376">1 level / 5 nodes</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.1892" x="41" y="203.3055">keys: CASH, EQUITY, DEBT, ...</text></g><!--entity gics--><g id="elem_gics"><rect fill="#FFF3F3" height="63.2038" rx="2.5" ry="2.5" style="stroke:#FF6666;stroke-width:0.5;" width="188.1673" x="297" y="147.2038"/><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="109.9276" x="307" y="165.1697">Industries (GICS)</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="128.9675" x="307" y="184.2376">4 levels / 262 nodes</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="168.1673" x="307" y="203.3055">keys: GICS numeric codes</text></g><!--entity gicss--><g id="elem_gicss"><rect fill="#FFF3F3" height="63.2038" rx="2.5" ry="2.5" style="stroke:#FF6666;stroke-width:0.5;" width="185.6334" x="503" y="147.2038"/><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="165.6334" x="513" y="165.1697">Industries (GICS, Sectors)</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="114.2535" x="513" y="184.2376">1 level / 11 nodes</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.1457" x="513" y="203.3055">keys: 10..60</text></g><!--entity aa--><g id="elem_aa"><rect fill="#FFF3F3" height="63.2038" rx="2.5" ry="2.5" style="stroke:#FF6666;stroke-width:0.5;" width="192.9834" x="22.5" y="246.2038"/><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="172.9834" x="32.5" y="264.1697">Asset Allocation (Kommer)</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="120.9595" x="32.5" y="283.2376">2 levels / 11 nodes</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="148.2594" x="32.5" y="302.3055">keys: K001, K002, K0xx</text></g><!--entity msci--><g id="elem_msci"><rect fill="#FFF3F3" height="63.2038" rx="2.5" ry="2.5" style="stroke:#FF6666;stroke-width:0.5;" width="261.401" x="233.5" y="246.2038"/><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="98.6716" x="243.5" y="264.1697">Regions (MSCI)</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="128.9675" x="243.5" y="283.2376">3 levels / 100 nodes</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="241.401" x="243.5" y="302.3055">keys: RW/REM/RFM/RSM, country_XX</text></g><!--entity tos--><g id="elem_tos"><rect fill="#FFF3F3" height="63.2038" rx="2.5" ry="2.5" style="stroke:#FF6666;stroke-width:0.5;" width="181.4613" x="512.5" y="246.2038"/><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="104.5376" x="522.5" y="264.1697">Type of Security</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="106.2456" x="522.5" y="283.2376">1 level / 7 nodes</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.4613" x="522.5" y="302.3055">keys: Stock, Fund, ETF, ...</text></g><!--entity brx--><g id="elem_brx"><rect fill="#E3F7E0" height="63.2038" rx="2.5" ry="2.5" style="stroke:#FF6666;stroke-width:0.5;" width="171.9694" x="1413" y="147.2038"/><text fill="#222222" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="116.4376" x="1423" y="165.1697">BRX-Plus (Byron)</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="120.9595" x="1423" y="184.2376">2 levels / 32 nodes</text><text fill="#222222" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="151.9694" x="1423" y="203.3055">keys: AC.* dot-notation</text></g><path d="M702.2764,245.9017 C702.741,245.934 703.189,245.9667 703.62,245.9998 C704.482,246.066 705.276,246.1339 706,246.2038 C