# GICS sector -> BRX-Plus sleeve key. ADR-016 E5.
#
# GICS and BRX-Plus are orthogonal lenses (GICS = issuer economic sector;
# BRX-Plus = portfolio strategy/factor). This file maps ONLY single-sector or
# thematic holdings to their sector sleeve. Broad-market / factor / region
# holdings span all sectors and are assigned by MANDATE upstream; the resolver
# guardrail (is_single_sector) prevents auto-assigning them from GICS.
#
# BRX-Plus keys validated against brx-plus-byron.taxonomy.json by
# tests/unit/test_classification_crosswalks.py.

version: 1
complete: true
# Fallback when a holding is single-sector but the GICS code is unknown.
default_for_single_sector: "AC.EQUITY.SECTOR_THEMATIC"
by_gics_sector:
  "10": "AC.EQUITY.SECTOR.ENERGY"
  "15": "AC.EQUITY.SECTOR.MATERIALS"
  "20": "AC.EQUITY.SECTOR.INDUSTRIALS"
  "25": "AC.EQUITY.SECTOR.CONS_DISC"
  "30": "AC.EQUITY.SECTOR.CONS_STAPLES"
  "35": "AC.EQUITY.SECTOR.HEALTH_CARE"
  "40": "AC.EQUITY.SECTOR.FINANCIALS"
  "45": "AC.EQUITY.SECTOR.INFO_TECH"
  "50": "AC.EQUITY.SECTOR.COMM_SVCS"
  "55": "AC.EQUITY.SECTOR.UTILITIES"
  "60": "AC.EQUITY.SECTOR.REAL_ESTATE"
