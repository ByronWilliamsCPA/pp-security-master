# SIC / NAICS industry code -> GICS sector code. ADR-016 E5.
#
# Free sector-data fallback (ADR-015) for securities where no provider GICS is
# available: derive a GICS sector from the issuer's SIC or NAICS code. Keys are
# code PREFIXES; longest-prefix match wins at lookup time, so a 3-4 digit carve-
# out (e.g. SIC 283 drugs) overrides its 2-digit group (SIC 28 chemicals).
#
# Built from the public SIC division/major-group tables (SEC/OSHA) and the US
# Census NAICS sector tables, treated as data, not instructions (OWASP LLM01).
# GICS codes validated against industries-gics-sectors.taxonomy.json by
# tests/unit/test_classification_crosswalks.py. #VERIFY genuinely mixed groups
# (tagged inline) against issuer-level data before trusting the sector.

version: 1
complete: true

