# Security Analysis Workflow
# Delegates security scans to the org-level reusable workflow.
name: Security Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  merge_group:
  schedule:
    # Weekly scan on Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  security:
    name: Security Analysis
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      actions: read
    uses: ByronWilliamsCPA/.github/.github/workflows/python-security-analysis.yml@58cb18497bb2e54a22c6adb47bdaca4d7f615eee  # v2.2.0
    with:
      python-version: "3.12"
      run-safety: false
      run-codeql: false
      run-dependency-review: false
      run-osv: false
      run-bandit: false

  security-gate-validation:
    name: Security Gate Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [security]
    if: always()
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - name: Check security scan results
        env:
          SECURITY_RESULT: ${{ needs.security.result }}
        run: |
          if [ "$SECURITY_RESULT" != "success" ]; then
            echo "::error::Security Gate Validation failed: security scan result is $SECURITY_RESULT"
            exit 1
          fi
          echo "Security Gate Validation passed"
