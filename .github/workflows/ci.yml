# CI-001 resolved: the bulk of CI (unit tests, Ruff, BasedPyright, Bandit,
# pip-audit) now runs through the org reusable workflow python-ci.yml. Two jobs
# are retained locally because the reusable workflow cannot host them:
#   - integration-tests: needs a PostgreSQL service container, which reusable
#     workflows cannot accept as an input.
#   - docs-lint: python-ci.yml does not run markdownlint/yamllint.
name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Unit tests (tiered matrix), Ruff format+lint, BasedPyright, Bandit, and
  # pip-audit (reads [tool.pip-audit].ignore-vuln from pyproject.toml).
  ci:
    name: Python CI
    uses: ByronWilliamsCPA/.github/.github/workflows/python-ci.yml@58cb18497bb2e54a22c6adb47bdaca4d7f615eee  # v2.2.0
    permissions:
      contents: read
    with:
      python-version: '3.11'
      enable-matrix-testing: true
      python-versions-pr: '["3.11", "3.12"]'
      python-versions-comprehensive: '["3.11", "3.12", "3.13"]'
      # No source-level tests yet (storage/export are untested); keep enforcement
      # off until Phase C backfills coverage, mirroring the prior --cov-fail-under=0.
      coverage-threshold: 0
      # Integration tests need PostgreSQL; handled by the integration-tests job below.
      run-integration-tests: false
      run-security-tests: true
      fail-on-security-findings: true
      # This project uses the hatchling build backend, so the package must build
      # during uv sync; do not pass --no-build.
      no-build: false
      # No secrets passed: python-ci.yml declares none (Codecov/Sonar were moved
      # to their own reusable workflows), so secrets: inherit would over-share.

  integration-tests:
    name: Integration Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    services:
      postgres:
        image: postgres:18@sha256:22c89fe0d0f507606260237fd55e51f6137f58b2d5bcf6152242b96d9fe8f9a4
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Set up test environment
        run: |
          echo "DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db" >> "$GITHUB_ENV"

      - name: Run integration tests with coverage
        run: |
          # --cov-fail-under=0: no source-level tests yet; override the 80%
          # pyproject threshold so the job fails only on real test failures.
          uv run --frozen pytest -v \
            --cov=src \
            --cov-report=xml:coverage-integration-${{ matrix.python-version }}.xml \
            --cov-report=term-missing \
            --cov-fail-under=0 \
            --junitxml=junit-integration-${{ matrix.python-version }}.xml \
            --tb=short \
            --maxfail=5 \
            -m integration

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: integration-test-results-${{ matrix.python-version }}
          path: |
            junit-integration-${{ matrix.python-version }}.xml
            coverage-integration-${{ matrix.python-version }}.xml

  docs-lint:
    name: Docs Lint (markdown + YAML)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Run markdown and YAML linting
        run: |
          npm install -g markdownlint-cli
          pip install yamllint
          markdownlint --config .markdownlint.yml "**/*.md"
          yamllint .

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ci, integration-tests, docs-lint]
    if: always()
    steps:
      - name: Check results
        env:
          CI_RESULT: ${{ needs.ci.result }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
          DOCS_RESULT: ${{ needs.docs-lint.result }}
        run: |
          if [[ "$CI_RESULT" == "success" && \
                "$INTEGRATION_RESULT" == "success" && \
                "$DOCS_RESULT" == "success" ]]; then
            echo "CI pipeline passed successfully"
          else
            echo "CI pipeline failed"
            echo "ci: $CI_RESULT"
            echo "integration-tests: $INTEGRATION_RESULT"
            echo "docs-lint: $DOCS_RESULT"
            exit 1
          fi
