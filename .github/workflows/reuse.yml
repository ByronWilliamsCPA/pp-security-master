# REUSE Compliance Check for Claude Code Configuration
# Validates REUSE 3.0 specification compliance for license management
#
# REUSE helps with clear licensing by using SPDX headers
# Documentation: https://reuse.software/
name: REUSE Compliance

# This job is a required status check in branch protection. It must run on
# every pull_request so it always reports a conclusion; a `paths` filter would
# silently skip the job on PRs that touch no matching file (for example,
# dependency bumps that only change root files), leaving the required check
# stuck at "Expected, waiting for status" and blocking the merge.
on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  merge_group:

permissions:
  contents: read

jobs:
  reuse:
    name: Check REUSE Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5  # v6

      - name: Generate REUSE SPDX
        if: success()
        run: |
          docker run --rm --volume $(pwd):/data fsfe/reuse:latest spdx --output /data/reuse-spdx.json

      - name: Upload REUSE SPDX
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: reuse-spdx
          path: reuse-spdx.json
          retention-days: 90

  validate-licenses:
    name: Validate License Files
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Check primary license exists
        run: |
          if [ ! -f "LICENSES/MIT.txt" ]; then
            echo "Warning: MIT.txt not found in LICENSES/"
            echo "You may need to download it from https://spdx.org/licenses/"
          fi

      - name: Verify REUSE.toml exists
        run: |
          if [ ! -f "REUSE.toml" ]; then
            echo "Error: REUSE.toml missing from repository root"
            exit 1
          fi
