# Alembic configuration for the Security Master service.
# Migration scripts are written to sql/versions/ (see CLAUDE.md). The runtime
# database URL is supplied via the DATABASE_URL environment variable; the
# sqlalchemy.url placeholder below is only a fallback when DATABASE_URL is unset.

[alembic]
# Migration environment lives in sql/ (env.py, script.py.mako, versions/).
script_location = sql

# Write generated revision scripts into sql/versions/.
version_locations = %(here)s/sql/versions

# Use os.pathsep (":" on POSIX) when joining multiple version_locations.
version_path_separator = os

# Placeholder only (no credentials). env.py prefers the DATABASE_URL
# environment variable and falls back to this value when DATABASE_URL is unset.
sqlalchemy.url = postgresql+psycopg2://localhost:5432/security_master


[post_write_hooks]
# No post-write hooks configured. Formatting is handled by the project pre-commit suite.


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
